<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>ログイン | 社員管理システム</title>
	<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body class="bg-light">
	<main class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
		<div class="card shadow-sm border-0" style="width: 100%; max-width: 420px;">
			<div class="card-body p-4 p-md-5">
				<h1 class="h3 text-center mb-2">社員管理システム</h1>
				<p class="text-secondary text-center mb-4">ログインしてください</p>

				<div th:if="${param.error}" class="alert alert-danger" role="alert">
					ログインIDまたはパスワードが正しくありません。
				</div>
				<div th:if="${param.logout}" class="alert alert-success" role="alert">
					ログアウトしました。
				</div>

				<form th:action="@{/login}" method="post">
					<div class="mb-3">
						<label for="loginId" class="form-label">ログインID</label>
						<input id="loginId" name="loginId" type="text" class="form-control"
							autocomplete="username" required autofocus>
					</div>
					<div class="mb-4">
						<label for="password" class="form-label">パスワード</label>
						<input id="password" name="password" type="password" class="form-control"
							autocomplete="current-password" required>
					</div>
					<button type="submit" class="btn btn-primary w-100">ログイン</button>
				</form>
			</div>
		</div>
	</main>
</body>
</html>
